version: '3.8'

services:
  api-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-builder
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    environment:
      - ENV_MODE=production
    restart: unless-stopped

  web-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-server
    ports:
      - "8080:80"
    depends_on:
      - api-backend
    restart: unless-stopped